# include palenight.conf
include nord.conf
# include dracula.conf
# Fira Code
# font_family         Fira Code Retina
# bold_font           Fira Code Bold
# italic_font         Fira Code Italic
# bold_italic_font    Fira Code Bold Italic

# JetBrains
font_family         JetBrains Mono Medium Nerd Font Complete
bold_font           JetBrains Mono Extra Bold Nerd Font Complete
italic_font         JetBrains Mono Medium Italic Nerd Font Complete
bold_italic_font    JetBrains Mono ExtBd Ita Nerd Font Complete
font_size           11

# Cascadia
# font_family         Caskaydia Cove Nerd Font Complete
# bold_font           Caskaydia Cove Nerd Font Complete Bold
# italic_font         Caskaydia Cove Nerd Font Complete Italic
# bold_italic_font    Caskaydia Cove Nerd Font Complete Bold Italic
# font_size           11


adjust_line_height  3
draw_minimal_borders no
hide_window_decorations no
window_margin_width 0
window_padding_width 0
single_window_margin_width -1

